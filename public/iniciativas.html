<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board de Iniciativas — Dysrupcion</title>
  <link rel="stylesheet" href="/css/design-system.css">
</head>
<body>
  <div id="site-nav"></div>

  <main class="page">

        <a href="/proponer.html" class="btn btn-primary">Proponer Iniciativa</a>

    <section class="filter-bar">

      <button class="filter-btn" data-track="ingenieria">Ingenieria</button>

    <div id="initiatives-list" class="initiatives-grid">

    </div>
  </main>

  <div id="site-footer"></div>

  <script src="/js/layout.js"></script>
